commit-msg:
  commands:
    # Never let an AI assistant stand as a commit co-author — an unlinked
    # assistant trailer registers a phantom contributor that can't sign the CLA
    # (see PR #166). Strips Claude/Anthropic co-author trailers; humans + bots
    # (e.g. dependabot) pass through.
    no-ai-coauthor:
      run: node scripts/strip-ai-coauthor.js {1}

pre-push:
  parallel: true
  commands:
    lint-js:
      run: npx eslint packages/shared/ packages/extension/sidepanel/ packages/extension/content/ packages/extension/background/ packages/desktop/src/ scripts/
    lint-css:
      glob: '*.css'
      run: npx stylelint 'packages/shared/views/**/*.css'
    lint-format:
      run: npx prettier --check .
    rust-fmt:
      run: cargo fmt --manifest-path packages/desktop/src-tauri/Cargo.toml --check
