name: Bug report
description: Something is not working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start a session
        2. Record a step
        3. ...
    validations:
      required: true

  - type: input
    id: chrome_version
    attributes:
      label: Chrome version
      placeholder: e.g. 124.0.6367.82
    validations:
      required: true

  - type: input
    id: extension_version
    attributes:
      label: Docent version
      placeholder: e.g. 1.0.0
    validations:
      required: true
