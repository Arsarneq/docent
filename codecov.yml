# Codecov configuration.
#
# Coverage is tracked along two independent axes via flags:
#   Pyramid layer:  unit | integration | e2e
#   Language:       javascript | rust
#
# Every upload is tagged with one layer flag and one language flag, so coverage
# can be sliced either way on Codecov (e.g. "all unit coverage" or "all Rust
# coverage"). carryforward keeps a flag's last-known coverage when its CI job is
# skipped by a path filter, so skipped jobs don't show as a coverage drop.

coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 2%
    patch:
      default:
        target: 80%

# Per-flag project status checks. Advisory (informational) for now while we
# confirm the flags populate correctly; promote to hard gates afterwards.
flag_management:
  default_rules:
    carryforward: true
  individual_flags:
    - name: unit
      statuses:
        - type: project
          target: 80%
          informational: true
    - name: integration
      statuses:
        - type: project
          informational: true
    - name: e2e
      statuses:
        - type: project
          informational: true
    - name: javascript
      statuses:
        - type: project
          informational: true
    - name: rust
      statuses:
        - type: project
          informational: true

# Components slice the merged report by area of code via path filters. Unlike
# flags (tagged at upload time, encoding how lines were covered), components are
# defined purely here and encode which package the code lives in. The two axes
# are orthogonal: flags answer "unit vs integration vs e2e / js vs rust",
# components answer "extension vs desktop vs shared".
component_management:
  default_rules:
    statuses:
      - type: project
        target: auto
        informational: true
  individual_components:
    - component_id: extension
      name: extension
      paths:
        - packages/extension/**
    - component_id: desktop
      name: desktop
      paths:
        - packages/desktop/**
    - component_id: shared
      name: shared
      paths:
        - packages/shared/**

# Show both the flag and component breakdowns in the PR comment.
comment:
  layout: 'header, diff, flags, components, files, footer'

ignore:
  - 'packages/*/tests/**'
  - 'packages/shared/views/adapter.js'
  - 'packages/*/shared/**'
