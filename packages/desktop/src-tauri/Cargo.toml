[package]
name = "docent-desktop"
version = "2.0.0"
edition = "2021"
description = "Docent Desktop — captures demonstrated workflows as structured data, not code"
license = "GPL-3.0-or-later"

[dependencies]
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
# Native HTTP transport: the desktop issues sync/dispatch/connection-test
# requests from Rust to bypass the webview's CORS. rustls-tls (no native-tls /
# OpenSSL) keeps this cross-platform for the future Linux target (#84).
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls"] }

[target.'cfg(windows)'.dependencies]
# Secret-at-rest: API keys are stored in the Windows Credential Manager
# rather than in plaintext inside session.json. keyring v3.x is the stable
# application-facing library API (v4 became a CLI/sample crate — the library
# moved to keyring-core; see the crate README). Gated to Windows because that
# is the only shipping target with a capture backend; other targets fall back
# to the previous inline behaviour.
keyring = { version = "3", features = ["windows-native"] }
windows = { version = "0.62", features = [
    "Win32_UI_Accessibility",
    "Win32_Foundation",
    "Win32_System_Com",
    "Win32_System_Ole",
    "Win32_System_Variant",
    "Win32_UI_WindowsAndMessaging",
    "Win32_Graphics_Gdi",
    "Win32_UI_HiDpi",
    "Win32_UI_Input_KeyboardAndMouse",
    "Win32_System_Threading",
    "Win32_System_ProcessStatus",
    "Win32_System_Diagnostics_ToolHelp",
] }

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dev-dependencies]
proptest = "1"
enigo = "0.6"
serial_test = "3"
tempfile = "3"

# SPIKE 2 (test-only): windows-core as a DIRECT dev-dependency exposes the
# `#[implement]` COM macro for the conformance-vector fixture's UIA
# OverrideProvider. Same version `windows` already resolves (0.62.2); under the
# edition-2021 resolver (v2) it never enters the shipped graph (cargo tree -e
# no-dev confirms). windows-core is already a transitive dep of the shipped build.
[target.'cfg(windows)'.dev-dependencies]
windows-core = "0.62"

[lib]
name = "docent_desktop_lib"
crate-type = ["lib", "cdylib", "staticlib"]
