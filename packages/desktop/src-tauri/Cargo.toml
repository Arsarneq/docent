[package]
name = "docent-desktop"
version = "1.0.0"
edition = "2021"
description = "Docent Desktop — native application interaction capture"

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"

[target.'cfg(windows)'.dependencies]
# Secret-at-rest (S2): API keys are stored in the Windows Credential Manager
# rather than in plaintext inside session.json. keyring v3.x is the stable
# application-facing library API (v4 became a CLI/sample crate — the library
# moved to keyring-core; see the crate README). Gated to Windows because that
# is the only shipping target with a capture backend; other targets fall back
# to the previous inline behaviour.
keyring = { version = "3", features = ["windows-native"] }
windows = { version = "0.62", features = [
    "Win32_UI_Accessibility",
    "Win32_Foundation",
    "Win32_System_Com",
    "Win32_System_Ole",
    "Win32_System_Variant",
    "Win32_UI_WindowsAndMessaging",
    "Win32_Graphics_Gdi",
    "Win32_UI_HiDpi",
    "Win32_UI_Input_KeyboardAndMouse",
    "Win32_System_Threading",
    "Win32_System_ProcessStatus",
    "Win32_System_Diagnostics_ToolHelp",
] }

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dev-dependencies]
proptest = "1"
enigo = "0.6"
serial_test = "3"
tempfile = "3"

[lib]
name = "docent_desktop_lib"
crate-type = ["lib", "cdylib", "staticlib"]
