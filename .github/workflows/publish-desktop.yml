name: Publish Desktop App

on:
  release:
    types: [published]
  # Dry-run: a manual dispatch rehearses the FULL pipeline (test gate, HEAD guard,
  # auto-version, installer build) with every external side-effect gated OFF — the
  # installer is built but NOT attached, and no version-table PR is opened. A real
  # publish happens ONLY via a published release. See `.github/PUBLISHING.md`.
  workflow_dispatch:

# Least-privilege default for GITHUB_TOKEN: the reusable `test` job (and any
# future job) inherits read-only; the `publish-desktop` job below grants itself
# the writes it needs. Closes the CodeQL "workflow does not limit GITHUB_TOKEN" alert.
permissions:
  contents: read

env:
  NODE_VERSION: '24'

jobs:
  # Gate publishing on a green FULL test suite for the release SHA. The suite is
  # the reusable test.yml; `publish-desktop` needs it, so a release can never
  # publish with red tests. Guarded by the same tag check so an extension-v*
  # release doesn't spin the suite here for nothing.
  test:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'desktop-v')
    uses: ./.github/workflows/test.yml
    with:
      platform: desktop
    secrets: inherit

  publish-desktop:
    needs: [test]
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'desktop-v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
          # Linux (#84) — uncomment when its capture backend lands.
          # - os: ubuntu-latest
          #   label: Linux
          # (macOS was dropped — see #83 — no free code-signing path; unsigned
          # macOS apps are unusable for Docent's non-technical audience.)
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
      pull-requests: write

    steps:
      # workflow_dispatch ⇒ dry-run (build the installer but don't attach it, no
      # version PR); a published release ⇒ the real publish. shell: bash because the
      # runner is windows-latest. Single source of truth for the gates below.
      - name: Resolve release mode
        id: mode
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=dry" >> "$GITHUB_OUTPUT"
            {
              echo "## 🧪 Dry run — no external side-effects"
              echo "Runs the full test gate, the build==tested HEAD guard, auto-version, and the Tauri installer build. The installer is BUILT but NOT attached to a release, and the version-table PR (create + auto-merge) is skipped."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "value=release" >> "$GITHUB_OUTPUT"
            echo "## 🚀 Real release — building + attaching the desktop installer" >> "$GITHUB_STEP_SUMMARY"
          fi

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: main

      # Build == tested tree. The `test` gate ran on github.sha (the released
      # commit); this job builds main. Fail fast if they differ — main advanced
      # during the gate, or the tag isn't at main HEAD — rather than publish a
      # tree the gate never tested. (Cut releases from main HEAD.)
      - name: Verify the released commit is current main HEAD
        shell: bash
        run: |
          HEAD_SHA="$(git rev-parse HEAD)"
          if [ "$HEAD_SHA" != "${{ github.sha }}" ]; then
            echo "::error::Released commit ${{ github.sha }} is not current main HEAD ($HEAD_SHA) — the test gate ran on ${{ github.sha }} but publish builds main. Refusing to publish an untested tree; re-cut the release from main HEAD."
            exit 1
          fi
          echo "✓ Released commit is main HEAD ($HEAD_SHA) — build matches the tested tree."

      - uses: ./.github/actions/debug-env

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Rust cache
        uses: swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: packages/desktop/src-tauri

      - name: Auto-version schemas and update version table
        if: matrix.os == 'windows-latest'
        run: node scripts/auto-version-schemas.js
        env:
          DOCENT_RELEASE: '1'

      # Format ALL release outputs, not an enumerated list that can miss a file.
      # auto-version writes manifest.json / tauri.conf.json / dist/ via
      # JSON.stringify (not Prettier-shaped); `npm run format` (prettier --write .)
      # normalises every one of them — plus any future script-written file —
      # while .prettierignore + already-clean sample stamps stay untouched.
      - name: Format release outputs
        if: matrix.os == 'windows-latest'
        run: npm run format

      - name: Check for version table / schema changes
        if: matrix.os == 'windows-latest'
        id: table-diff
        shell: bash
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR for schema version + published schema update if changed
        if: matrix.os == 'windows-latest' && steps.mode.outputs.value != 'dry' && steps.table-diff.outputs.changed == 'true'
        id: version-pr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          base: main
          commit-message: 'chore: auto-version schemas and refresh published dist'
          title: 'chore: auto-version schemas and refresh published dist'
          body: 'Automated schema versioning: the schema change since the last release was classified and the affected version(s) bumped in the leaf delta(s), with schemas/dist/, the version tables, and badges refreshed to match.'
          branch: automated/version-table-update
          labels: docs
          delete-branch: true

      - name: Auto-merge version table PR
        if: matrix.os == 'windows-latest' && steps.mode.outputs.value != 'dry' && steps.version-pr.outputs.pull-request-number
        run: gh pr merge ${{ steps.version-pr.outputs.pull-request-number }} --auto --squash
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Sync shared code into desktop
        run: node scripts/sync-shared.js desktop

      - name: Bump desktop version from release tag
        if: steps.mode.outputs.value != 'dry'
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${RELEASE_TAG#desktop-v}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$RELEASE_TAG" ]; then
            echo "::error::Could not derive version from release tag '$RELEASE_TAG' (expected 'desktop-v<x.y.z>')"
            exit 1
          fi
          echo "Bumping desktop version to $VERSION"
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('packages/desktop/src-tauri/tauri.conf.json', 'utf8'));
            conf.version = '$VERSION';
            fs.writeFileSync('packages/desktop/src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "
          echo "tauri.conf.json version is now $(node -e "console.log(JSON.parse(require('fs').readFileSync('packages/desktop/src-tauri/tauri.conf.json','utf8')).version)")"

          # Build-time OVERLAY of the Rust crate version (Cargo.toml + Cargo.lock),
          # never committed — this step runs AFTER the version PR is opened. Mirrors
          # the tauri.conf.json overlay above so the BUILT binary's crate metadata
          # matches the release TAG on a tag != schema release. Cargo.lock is updated
          # too (anchored on the docent-desktop block) so the build stays consistent
          # even if the Tauri build runs cargo with --locked/--frozen.
          node -e "
            const fs = require('fs');
            const toml = 'packages/desktop/src-tauri/Cargo.toml';
            fs.writeFileSync(toml, fs.readFileSync(toml, 'utf8').replace(/^version = \"[^\"]*\"/m, 'version = \"$VERSION\"'));
            const lock = 'packages/desktop/src-tauri/Cargo.lock';
            const re = /(name = \"docent-desktop\"\r?\nversion = \")[^\"]*(\")/;
            const c = fs.readFileSync(lock, 'utf8');
            if (!re.test(c)) { console.error('::error::docent-desktop block not found in Cargo.lock'); process.exit(1); }
            fs.writeFileSync(lock, c.replace(re, (m, p1, p2) => p1 + '$VERSION' + p2));
          "
          echo "Cargo.toml version is now $(grep -m1 '^version = ' packages/desktop/src-tauri/Cargo.toml)"

      - name: Build desktop frontend dist
        run: node scripts/build-desktop-dist.js

      - name: Build Tauri application
        id: tauri
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: packages/desktop
          # Dry run ⇒ build-only: empty tag/name/body make tauri-action compile +
          # bundle the installer WITHOUT creating or attaching a GitHub release. The
          # real (release-triggered) path passes the tag, so the installer attaches.
          tagName: ${{ steps.mode.outputs.value == 'release' && github.event.release.tag_name || '' }}
          releaseName: ${{ steps.mode.outputs.value == 'release' && format('Docent Desktop {0}', github.event.release.tag_name) || '' }}
          releaseBody: ${{ steps.mode.outputs.value == 'release' && github.event.release.body || '' }}
          releaseDraft: false
          prerelease: false
          # The Tauri auto-updater is intentionally OFF — there is no
          # tauri-plugin-updater dependency and no plugins.updater in
          # tauri.conf.json, so no updater bundles or latest.json are produced and
          # no signing keys (TAURI_SIGNING_PRIVATE_KEY*) are needed. Set this
          # explicitly so a future updater can't silently ship unsigned.
          # NOTE: the Windows INSTALLER is a separate concern — it ships UNSIGNED
          # today (SmartScreen "Unknown publisher"), tracked by #72 (SignPath
          # Foundation EV signing); wire signing in here once that lands.
          includeUpdaterJson: false
          # Verbose Tauri/cargo build output only when debug logging is on.
          args: ${{ runner.debug == '1' && '--verbose' || '' }}

      # Dry-run substitute for the release-asset attach: prove the installer
      # actually built (tauri-action ran in build-only mode), without uploading.
      - name: Validate installer build (dry run)
        if: steps.mode.outputs.value == 'dry'
        shell: bash
        run: |
          PATHS='${{ steps.tauri.outputs.artifactPaths }}'
          echo "tauri-action artifactPaths: ${PATHS:-<empty>}"
          BUNDLE_COUNT=$(find packages/desktop/src-tauri/target -path '*/release/bundle/*' \( -name '*.exe' -o -name '*.msi' \) 2>/dev/null | wc -l | tr -d '[:space:]')
          if [ -z "$PATHS" ] && [ "$BUNDLE_COUNT" -eq 0 ]; then
            echo "::error::No installer artifacts found — the Tauri build produced nothing."
            exit 1
          fi
          echo "✓ Installer built (release attach skipped in dry run)."
          {
            echo "### Desktop installer (dry run)"
            echo "- tauri-action artifactPaths: \`${PATHS:-<empty>}\`"
            echo "- installer bundles found: ${BUNDLE_COUNT}"
            echo "- GitHub release attach: **skipped**"
          } >> "$GITHUB_STEP_SUMMARY"
