name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla_assistant:
    runs-on: ubuntu-latest
    if: |
      (github.event.comment.body == 'recheck' ||
       github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
       (github.event_name == 'pull_request_target' &&
        github.event.pull_request.user.login != 'dependabot[bot]')
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # contributor-assistant pins the action to node20 (v2.6.1 is the
          # latest release and even master still declares node20 — there is no
          # node24 release to bump to). GitHub forces JavaScript actions onto
          # Node 24 on 2026-06-16 and removes Node 20 on 2026-09-16. Opt in now
          # so any incompatibility surfaces here as an early warning rather than
          # breaking the CLA gate on the forced-cutover date. Remove this once
          # the action ships a native node24 release.
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/${{ github.repository }}/blob/main/CLA.md'
          branch: 'signatures'
          allowlist: bot*,dependabot[bot]
          custom-pr-sign-comment: >
            I have read the CLA Document and I hereby sign the CLA
          signed-commit-message: >
            $contributorName signed the CLA
