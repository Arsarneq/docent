# Enforces Conventional Commits PR titles. Docent squash-merges, so the PR title
# becomes the commit subject on main — the input scripts/next-release-version.js
# parses for release versioning, and the project's commit history. This keeps it
# well-formed. See .github/CONTRIBUTING.md ("Pull Request Guidelines").
name: PR title

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read

env:
  NODE_VERSION: '24'

jobs:
  conventional-title:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Check PR title is a Conventional Commit
        env:
          # Passed via env (never interpolated into the shell) so a crafted title
          # cannot inject commands.
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: node scripts/check-pr-title.js
