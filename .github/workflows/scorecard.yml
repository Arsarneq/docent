# OpenSSF Scorecard — weekly supply-chain & project-hygiene posture check.
# Scores signals like action pinning, branch protection, token permissions,
# dangerous workflow patterns, and the presence of a security policy, then uploads
# the result to the Security tab as code-scanning alerts. Monitoring/visibility
# only — it surfaces regressions in action SHA-pinning + branch protection over time; it does
# not change CI behaviour.
#
# publish_results is OFF: OpenSSF's publish verification rejects SHA-pinned actions
# ("imposter commit") and requires every action in the workflow to be tag-pinned —
# which conflicts with our action SHA-pinning. We keep the Security-tab SARIF (the
# actionable monitoring) and forgo the public scorecard.dev badge.
name: Scorecard supply-chain security

on:
  branch_protection_rule:
  schedule:
    - cron: '24 6 * * 1' # Every Monday at 06:24 UTC
  push:
    branches: [main]
  workflow_dispatch:

# Top-level token is read-only; the job elevates only what Scorecard needs.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload the SARIF result to the Security tab
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: false

      - name: Upload SARIF as a workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload SARIF to the code-scanning dashboard
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: results.sarif
