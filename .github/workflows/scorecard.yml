# OpenSSF Scorecard (S19) — weekly supply-chain & project-hygiene posture check.
# Scores signals like action pinning, branch protection, token permissions,
# dangerous workflow patterns, and the presence of a security policy, then uploads
# the result to the Security tab as code-scanning alerts (and to the public OpenSSF
# API for the README badge). Monitoring/visibility only — it surfaces regressions
# in S17/S18 + branch protection over time; it does not change CI behaviour.
name: Scorecard supply-chain security

on:
  branch_protection_rule:
  schedule:
    - cron: '24 6 * * 1' # Every Monday at 06:24 UTC
  push:
    branches: [main]
  workflow_dispatch:

# Top-level token is read-only; the job elevates only what Scorecard needs.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload the SARIF result to the Security tab
      id-token: write # publish results to the public OpenSSF API (the badge)
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@99c09fe975337306107572b4fdf4db224cf8e2f2 # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF as a workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload SARIF to the code-scanning dashboard
        uses: github/codeql-action/upload-sarif@b0c4fd77f6c559021d78430ec4d0d169ae74a4eb # v3
        with:
          sarif_file: results.sarif
