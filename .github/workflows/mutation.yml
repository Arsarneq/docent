name: Mutation Testing

on:
  schedule:
    - cron: '0 6 * * 1' # Every Monday at 06:00 UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read

env:
  NODE_VERSION: '24'

jobs:
  stryker-shared:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/debug-env

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Run Stryker — shared package
        run: npm run test:mutation ${{ runner.debug == '1' && '-- --logLevel trace' || '' }}

      - name: Upload shared mutation report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mutation-report-shared
          path: reports/mutation/
          retention-days: 30

  stryker-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/debug-env

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Install extension test dependencies
        run: cd packages/extension && npm ci

      - name: Sync shared code
        run: npm run sync-shared

      - name: Run Stryker — extension
        run: npm run test:mutation:extension ${{ runner.debug == '1' && '-- --logLevel trace' || '' }}

      - name: Upload extension mutation report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mutation-report-extension
          path: reports/mutation-extension/
          retention-days: 30

  stryker-desktop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/debug-env

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Sync shared code
        run: npm run sync-shared

      - name: Build desktop dist
        run: npm run build:desktop-dist

      - name: Run Stryker — desktop
        run: npm run test:mutation:desktop ${{ runner.debug == '1' && '-- --logLevel trace' || '' }}

      - name: Upload desktop mutation report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mutation-report-desktop
          path: reports/mutation-desktop/
          retention-days: 30

  # Rust mutation testing, scoped to the capture backend's unit-tested logic
  # modules (see packages/desktop/src-tauri/.cargo/mutants.toml, including why
  # the live-input capture path is deliberately out of scope). Measurement
  # posture for now: missed mutants are reported in the run summary, not
  # failing — once a few weekly runs establish the baseline, drop the exit-code
  # tolerance below so a regression reddens the run like the Stryker jobs do.
  cargo-mutants-desktop:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/debug-env

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable

      - name: Cache cargo-mutants
        id: cache-cargo-mutants
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cargo/bin/cargo-mutants.exe
          key: ${{ runner.os }}-cargo-mutants-27.1

      - name: Install cargo-mutants
        if: steps.cache-cargo-mutants.outputs.cache-hit != 'true'
        run: cargo install cargo-mutants --version 27.1.0 --locked

      - name: Cache cargo registry and build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('packages/desktop/src-tauri/Cargo.lock') }}

      # The Tauri build script only needs the frontend dist directory to exist.
      - name: Create frontend dist directory
        working-directory: packages/desktop
        run: New-Item -ItemType Directory -Force -Path dist | Out-Null
        shell: pwsh

      # --in-place: the build reads ../dist, which sits outside the cargo tree,
      # so mutants must build in the real tree (serially) rather than in a copy.
      # Exit codes 2 (missed mutants) and 3 (a mutant timed out — a normal
      # mutation outcome) are tolerated while this job is measuring its
      # baseline; a genuine build/tool failure still fails the job.
      - name: Run cargo-mutants (scoped)
        working-directory: packages/desktop/src-tauri
        shell: bash
        run: |
          set +e
          cargo mutants --in-place
          code=$?
          if [ "$code" -ne 0 ] && [ "$code" -ne 2 ] && [ "$code" -ne 3 ]; then exit "$code"; fi

      - name: Report outcomes to the run summary
        if: always()
        working-directory: packages/desktop/src-tauri
        shell: bash
        run: |
          {
            echo "## cargo-mutants (desktop capture logic modules)"
            for f in caught missed timeout unviable; do
              n=$(wc -l < "mutants.out/$f.txt" 2>/dev/null || echo 0)
              echo "- $f: $n"
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload cargo-mutants output
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mutation-report-desktop-rust
          path: packages/desktop/src-tauri/mutants.out/
          retention-days: 30
