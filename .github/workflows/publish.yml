name: Publish to Chrome Web Store

on:
  release:
    types: [published]

jobs:
  publish:
    if: startsWith(github.event.release.tag_name, 'extension-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update version compatibility table
        run: node scripts/update-version-table.js

      - name: Create PR for version table update if changed
        id: version-pr
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: 'docs: update version compatibility table'
          title: 'docs: update version compatibility table'
          body: 'Automated update of the version compatibility table in README.md after release.'
          branch: automated/version-table-update
          labels: docs
          delete-branch: true

      - name: Auto-merge version table PR
        if: steps.version-pr.outputs.pull-request-number
        run: gh pr merge ${{ steps.version-pr.outputs.pull-request-number }} --auto --squash
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Sync shared code into extension
        run: node scripts/sync-shared.js extension

      - name: Package extension
        run: |
          cd packages/extension && zip -r ../../extension.zip . \
            --exclude 'node_modules/*' \
            --exclude 'package.json' \
            --exclude 'package-lock.json' \
            --exclude 'tests/*'

      - name: Upload to Chrome Web Store
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: extension.zip
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
