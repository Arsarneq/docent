name: Publish to Chrome Web Store

on:
  release:
    types: [published]

# Least-privilege default for GITHUB_TOKEN: the reusable `test` job (and any
# future job) inherits read-only; the `publish` job below grants itself the
# writes it needs. Closes the CodeQL "workflow does not limit GITHUB_TOKEN" alert.
permissions:
  contents: read

env:
  NODE_VERSION: '24'

jobs:
  # Gate publishing on a green FULL test suite for the release SHA. The suite is
  # the reusable test.yml; `publish` needs it, so a release can never publish
  # with red tests. Guarded by the same tag check so a desktop-v* release doesn't
  # spin the suite here for nothing.
  test:
    if: startsWith(github.event.release.tag_name, 'extension-v')
    uses: ./.github/workflows/test.yml
    secrets: inherit

  publish:
    needs: [test]
    if: startsWith(github.event.release.tag_name, 'extension-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: main

      # Build == tested tree. The `test` gate ran on github.sha (the released
      # commit); this job builds main. Fail fast if they differ — main advanced
      # during the gate, or the tag isn't at main HEAD — rather than publish a
      # tree the gate never tested. (Cut releases from main HEAD.)
      - name: Verify the released commit is current main HEAD
        run: |
          HEAD_SHA="$(git rev-parse HEAD)"
          if [ "$HEAD_SHA" != "${{ github.sha }}" ]; then
            echo "::error::Released commit ${{ github.sha }} is not current main HEAD ($HEAD_SHA) — the test gate ran on ${{ github.sha }} but publish builds main. Refusing to publish an untested tree; re-cut the release from main HEAD."
            exit 1
          fi
          echo "✓ Released commit is main HEAD ($HEAD_SHA) — build matches the tested tree."

      - uses: ./.github/actions/debug-env

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Auto-version schemas and update version table
        run: node scripts/auto-version-schemas.js
        env:
          DOCENT_RELEASE: '1'

      # Format ALL release outputs, not an enumerated list that can miss a file.
      # auto-version writes manifest.json / tauri.conf.json / dist/ via
      # JSON.stringify (not Prettier-shaped); `npm run format` (prettier --write .)
      # normalises every one of them — plus any future script-written file —
      # while .prettierignore + already-clean sample stamps stay untouched.
      - name: Format release outputs
        run: npm run format

      - name: Check for version table / schema changes
        id: table-diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR for schema version + published schema update if changed
        if: steps.table-diff.outputs.changed == 'true'
        id: version-pr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          base: main
          commit-message: 'chore: auto-version schemas and refresh published dist'
          title: 'chore: auto-version schemas and refresh published dist'
          body: 'Automated schema versioning: the schema change since the last release was classified and the affected version(s) bumped in the leaf delta(s), with schemas/dist/, the version tables, and badges refreshed to match.'
          branch: automated/version-table-update
          labels: docs
          delete-branch: true

      - name: Auto-merge version table PR
        if: steps.version-pr.outputs.pull-request-number
        run: gh pr merge ${{ steps.version-pr.outputs.pull-request-number }} --auto --squash
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Sync shared code into extension
        run: node scripts/sync-shared.js extension

      - name: Bump extension version from release tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${RELEASE_TAG#extension-v}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$RELEASE_TAG" ]; then
            echo "::error::Could not derive version from release tag '$RELEASE_TAG' (expected 'extension-v<x.y.z>')"
            exit 1
          fi
          echo "Bumping extension version to $VERSION"
          cd packages/extension
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            m.version = '$VERSION';
            fs.writeFileSync('manifest.json', JSON.stringify(m, null, 2) + '\n');
          "
          echo "manifest.json version is now $(node -e "console.log(JSON.parse(require('fs').readFileSync('manifest.json','utf8')).version)")"

      - name: Package extension
        run: |
          cd packages/extension && zip -r ../../extension.zip . \
            --exclude 'node_modules/*' \
            --exclude 'package.json' \
            --exclude 'package-lock.json' \
            --exclude 'tests/*'

      - name: Upload to Chrome Web Store
        run: |
          # Get access token from refresh token
          TOKEN_RESPONSE=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d "client_id=${{ secrets.CHROME_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.CHROME_CLIENT_SECRET }}" \
            -d "refresh_token=${{ secrets.CHROME_REFRESH_TOKEN }}" \
            -d "grant_type=refresh_token")
          ACCESS_TOKEN=$(echo $TOKEN_RESPONSE | jq -r '.access_token')
          if [ "$ACCESS_TOKEN" = "null" ] || [ -z "$ACCESS_TOKEN" ]; then
            echo "::error::Failed to get access token"
            echo "$TOKEN_RESPONSE" | jq .
            exit 1
          fi
          echo "Access token obtained successfully"

          # Upload the zip
          echo "Uploading extension.zip to Chrome Web Store..."
          UPLOAD_RESPONSE=$(curl -s \
            -X PUT \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "x-goog-api-version: 2" \
            -T extension.zip \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/${{ secrets.CHROME_EXTENSION_ID }}")
          echo "Upload response:"
          echo "$UPLOAD_RESPONSE" | jq .
          UPLOAD_STATUS=$(echo "$UPLOAD_RESPONSE" | jq -r '.uploadState')
          if [ "$UPLOAD_STATUS" != "SUCCESS" ]; then
            # Surface the real reason in the annotation, not just the state. The
            # CWS API reports failures as itemError[] (or a top-level error).
            DETAIL=$(echo "$UPLOAD_RESPONSE" | jq -r 'if .itemError then ([.itemError[] | "\(.error_code): \(.error_detail)"] | join("; ")) elif .error.message then .error.message else "see Upload response above" end')
            echo "::error::Upload failed (state: $UPLOAD_STATUS) — $DETAIL"
            exit 1
          fi

          # Publish
          echo "Publishing extension..."
          PUBLISH_RESPONSE=$(curl -s \
            -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "x-goog-api-version: 2" \
            -H "Content-Length: 0" \
            "https://www.googleapis.com/chromewebstore/v1.1/items/${{ secrets.CHROME_EXTENSION_ID }}/publish")
          echo "Publish response:"
          echo "$PUBLISH_RESPONSE" | jq .
          PUBLISH_STATUS=$(echo "$PUBLISH_RESPONSE" | jq -r '.status[0]')
          if [ "$PUBLISH_STATUS" != "OK" ]; then
            # The bare status code is often "null"/uninformative — emit the real
            # message. CWS returns statusDetail[] alongside status[], or a
            # top-level error object (e.g. the Privacy-practices 400).
            DETAIL=$(echo "$PUBLISH_RESPONSE" | jq -r 'if .statusDetail then (.statusDetail | join("; ")) elif .error.message then .error.message else "see Publish response above" end')
            echo "::error::Publish failed (status: $PUBLISH_STATUS) — $DETAIL"
            exit 1
          fi
          echo "Extension published successfully!"
