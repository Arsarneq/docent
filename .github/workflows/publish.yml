name: Publish to Chrome Web Store

on:
  release:
    types: [published]
  # Dry-run: a manual dispatch rehearses the FULL pipeline (test gate, HEAD guard,
  # auto-version, package build) with every external side-effect gated OFF — no
  # Chrome Web Store upload, no version-table PR. A real publish happens ONLY via a
  # published release. See `.github/PUBLISHING.md` → "Dry-run a publish".
  workflow_dispatch:

# Least-privilege default for GITHUB_TOKEN: the reusable `test` job (and any
# future job) inherits read-only; the `publish` job below grants itself the
# writes it needs. Closes the CodeQL "workflow does not limit GITHUB_TOKEN" alert.
permissions:
  contents: read

env:
  NODE_VERSION: '24'

jobs:
  # Gate publishing on a green FULL test suite for the release SHA. The suite is
  # the reusable test.yml; `publish` needs it, so a release can never publish
  # with red tests. Guarded by the same tag check so a desktop-v* release doesn't
  # spin the suite here for nothing.
  test:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'extension-v')
    uses: ./.github/workflows/test.yml
    with:
      platform: extension
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  publish:
    needs: [test]
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'extension-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      # Three modes, resolved once and read by every side-effect gate below:
      #   dry        — workflow_dispatch: build only, no external effects.
      #   prerelease — a release flagged "pre-release": build + attach the package
      #                to the GitHub pre-release for sideloading; NO store, NO PR.
      #   final      — a normal published release: Chrome Web Store + version PR.
      # GitHub's release.prerelease flag drives the mode; the tag drives the version.
      - name: Resolve release mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=dry" >> "$GITHUB_OUTPUT"
            {
              echo "## 🧪 Dry run — no external side-effects"
              echo "Builds the dispatched ref and runs the full test gate, auto-version, and the extension package build. SKIPS the HEAD guard, the Chrome Web Store upload, and the version-table PR (create + auto-merge)."
            } >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ github.event.release.prerelease }}" = "true" ]; then
            echo "value=prerelease" >> "$GITHUB_OUTPUT"
            {
              echo "## 🧪 Pre-release — sideload build, no Chrome Web Store"
              echo "Builds the tagged commit and attaches the extension package to the GitHub pre-release for sideloading. SKIPS the Chrome Web Store upload and the version-table PR (a pre-release never bumps the committed version)."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "value=final" >> "$GITHUB_OUTPUT"
            echo "## 🚀 Real release — publishing to the Chrome Web Store" >> "$GITHUB_STEP_SUMMARY"
          fi

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ github.sha }}

      # The release.prerelease flag drives the mode while the tag drives the
      # version — keep them honest: a `-rc.N` tag must be a pre-release and a clean
      # X.Y.Z must not. A mismatch is a release mistake, caught before any build.
      - name: Validate release tag vs pre-release flag
        if: steps.mode.outputs.value != 'dry'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          IS_PRERELEASE: ${{ github.event.release.prerelease }}
          TAG_PREFIX: extension-v
        run: node scripts/check-release-tag.js

      # Build == tested tree. We check out github.sha — the exact commit the test
      # gate ran on — so the build always matches what was tested. For a FINAL
      # release we additionally require that commit to be current main HEAD, so
      # the version-table PR (base: main) stays coherent and we never publish a
      # tree that diverged from main. Skipped for dry-runs and pre-releases
      # (neither opens a version PR, so neither needs the build to equal main).
      - name: Verify the released commit is current main HEAD
        if: steps.mode.outputs.value == 'final'
        run: |
          git fetch --depth=1 origin main
          MAIN_SHA="$(git rev-parse FETCH_HEAD)"
          if [ "${{ github.sha }}" != "$MAIN_SHA" ]; then
            echo "::error::Released commit ${{ github.sha }} is not current main HEAD ($MAIN_SHA) — refusing to publish a tree that diverged from main. Re-cut the release from main HEAD."
            exit 1
          fi
          echo "✓ Released commit is current main HEAD ($MAIN_SHA) — build matches the tested tree."

      - uses: ./.github/actions/debug-env

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Auto-version schemas and update version table
        run: node scripts/auto-version-schemas.js
        env:
          DOCENT_RELEASE: '1'

      # Format ALL release outputs, not an enumerated list that can miss a file.
      # auto-version writes manifest.json / tauri.conf.json / dist/ via
      # JSON.stringify (not Prettier-shaped); `npm run format` (prettier --write .)
      # normalises every one of them — plus any future script-written file —
      # while .prettierignore + already-clean sample stamps stay untouched.
      - name: Format release outputs
        run: npm run format

      - name: Check for version table / schema changes
        id: table-diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR for schema version + published schema update if changed
        if: steps.mode.outputs.value == 'final' && steps.table-diff.outputs.changed == 'true'
        id: version-pr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          base: main
          commit-message: 'chore: auto-version schemas and refresh published dist'
          title: 'chore: auto-version schemas and refresh published dist'
          body: 'Automated schema versioning: the schema change since the last release was classified and the affected version(s) bumped in the leaf delta(s), with schemas/dist/, the version tables, and badges refreshed to match.'
          branch: automated/version-table-update
          labels: docs
          delete-branch: true

      - name: Auto-merge version table PR
        if: steps.mode.outputs.value == 'final' && steps.version-pr.outputs.pull-request-number
        run: gh pr merge "$PR_NUMBER" --auto --squash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.version-pr.outputs.pull-request-number }}

      - name: Sync shared code into extension
        run: node scripts/sync-shared.js extension

      - name: Bump extension version from release tag
        if: steps.mode.outputs.value != 'dry'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${RELEASE_TAG#extension-v}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$RELEASE_TAG" ]; then
            echo "::error::Could not derive version from release tag '$RELEASE_TAG' (expected 'extension-v<x.y.z>')"
            exit 1
          fi
          # Chrome manifest versions are 1–4 dot-separated integers — they cannot
          # carry a semver pre-release suffix. A pre-release tag
          # (extension-v3.1.0-rc.1) therefore ships a manifest version of the base
          # X.Y.Z (3.1.0); the rc identity lives in the GitHub pre-release it's
          # sideloaded from, not the package. No-op for a final tag (no suffix).
          VERSION="${VERSION%%-*}"
          echo "Bumping extension version to $VERSION"
          cd packages/extension
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            m.version = '$VERSION';
            fs.writeFileSync('manifest.json', JSON.stringify(m, null, 2) + '\n');
          "
          echo "manifest.json version is now $(node -e "console.log(JSON.parse(require('fs').readFileSync('manifest.json','utf8')).version)")"

      - name: Package extension
        run: |
          cd packages/extension && zip -r ../../extension.zip . \
            --exclude 'node_modules/*' \
            --exclude 'package.json' \
            --exclude 'package-lock.json' \
            --exclude 'tests/*'

      - name: Upload to Chrome Web Store
        if: steps.mode.outputs.value == 'final'
        run: |
          # Get access token from refresh token
          TOKEN_RESPONSE=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d "client_id=${{ secrets.CHROME_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.CHROME_CLIENT_SECRET }}" \
            -d "refresh_token=${{ secrets.CHROME_REFRESH_TOKEN }}" \
            -d "grant_type=refresh_token")
          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token')
          if [ "$ACCESS_TOKEN" = "null" ] || [ -z "$ACCESS_TOKEN" ]; then
            echo "::error::Failed to get access token"
            echo "$TOKEN_RESPONSE" | jq .
            exit 1
          fi
          echo "Access token obtained successfully"

          # Upload the zip
          echo "Uploading extension.zip to Chrome Web Store..."
          UPLOAD_RESPONSE=$(curl -s \
            -X PUT \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "x-goog-api-version: 2" \
            -T extension.zip \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/${{ secrets.CHROME_EXTENSION_ID }}")
          echo "Upload response:"
          echo "$UPLOAD_RESPONSE" | jq .
          UPLOAD_STATUS=$(echo "$UPLOAD_RESPONSE" | jq -r '.uploadState')
          if [ "$UPLOAD_STATUS" != "SUCCESS" ]; then
            # Surface the real reason in the annotation, not just the state. The
            # CWS API reports failures as itemError[] (or a top-level error).
            DETAIL=$(echo "$UPLOAD_RESPONSE" | jq -r 'if .itemError then ([.itemError[] | "\(.error_code): \(.error_detail)"] | join("; ")) elif .error.message then .error.message else "see Upload response above" end')
            echo "::error::Upload failed (state: $UPLOAD_STATUS) — $DETAIL"
            exit 1
          fi

          # Publish
          echo "Publishing extension..."
          PUBLISH_RESPONSE=$(curl -s \
            -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "x-goog-api-version: 2" \
            -H "Content-Length: 0" \
            "https://www.googleapis.com/chromewebstore/v1.1/items/${{ secrets.CHROME_EXTENSION_ID }}/publish")
          echo "Publish response:"
          echo "$PUBLISH_RESPONSE" | jq .
          PUBLISH_STATUS=$(echo "$PUBLISH_RESPONSE" | jq -r '.status[0]')
          if [ "$PUBLISH_STATUS" != "OK" ]; then
            # The bare status code is often "null"/uninformative — emit the real
            # message. CWS returns statusDetail[] alongside status[], or a
            # top-level error object (e.g. the Privacy-practices 400).
            DETAIL=$(echo "$PUBLISH_RESPONSE" | jq -r 'if .statusDetail then (.statusDetail | join("; ")) elif .error.message then .error.message else "see Publish response above" end')
            echo "::error::Publish failed (status: $PUBLISH_STATUS) — $DETAIL"
            exit 1
          fi
          echo "Extension published successfully!"

      # Pre-release: the package isn't sent to the store — it's attached to the
      # GitHub pre-release so testers can sideload it (manifest carries the base
      # X.Y.Z; the rc identity is the pre-release they got it from).
      - name: Attach extension package to the GitHub pre-release
        if: steps.mode.outputs.value == 'prerelease'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "$RELEASE_TAG" extension.zip --clobber
          echo "✓ extension.zip attached to pre-release $RELEASE_TAG for sideloading (not sent to the Chrome Web Store)."

      # Dry-run substitute for the CWS upload: prove the package built and is
      # upload-ready (zip exists + manifest at the root carries a version), without
      # contacting the Chrome Web Store.
      - name: Validate extension package (dry run)
        if: steps.mode.outputs.value == 'dry'
        run: |
          if [ ! -s extension.zip ]; then
            echo "::error::extension.zip was not produced (or is empty) — the package build failed."
            exit 1
          fi
          SIZE=$(stat -c%s extension.zip)
          MANIFEST_VERSION=$(unzip -p extension.zip manifest.json | jq -r '.version')
          if [ -z "$MANIFEST_VERSION" ] || [ "$MANIFEST_VERSION" = "null" ]; then
            echo "::error::manifest.json is missing from the zip root or has no version."
            exit 1
          fi
          echo "✓ extension.zip built (${SIZE} bytes), manifest version ${MANIFEST_VERSION} — upload-ready (CWS upload skipped in dry run)."
          {
            echo "### Extension package (dry run)"
            echo "- \`extension.zip\`: ${SIZE} bytes"
            echo "- \`manifest.json\` version: \`${MANIFEST_VERSION}\`"
            echo "- Chrome Web Store upload: **skipped**"
          } >> "$GITHUB_STEP_SUMMARY"
