name: Publish to Chrome Web Store

on:
  release:
    types: [published]

jobs:
  publish:
    if: startsWith(github.event.release.tag_name, 'extension-v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update version compatibility table
        run: node scripts/update-version-table.js

      - name: Commit version table if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || (git commit -m "docs: update version compatibility table" && git push origin HEAD:main)

      - name: Sync shared code into extension
        run: node scripts/sync-shared.js extension

      - name: Package extension
        run: |
          cd packages/extension && zip -r ../../extension.zip . \
            --exclude 'node_modules/*' \
            --exclude 'package.json' \
            --exclude 'package-lock.json' \
            --exclude 'tests/*'

      - name: Upload to Chrome Web Store
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: extension.zip
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
