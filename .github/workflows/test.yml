name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint:js

      - name: Stylelint
        run: npm run lint:css

      - name: Prettier check
        run: npm run lint:format

      - name: markdownlint
        run: npm run lint:md

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo fmt check
        working-directory: packages/desktop/src-tauri
        run: cargo fmt --check

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm ci

      - name: Audit npm dependencies
        run: npm audit --audit-level=high

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Audit Rust dependencies
        working-directory: packages/desktop/src-tauri
        run: cargo audit

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm ci

      - name: Install extension test dependencies
        run: cd packages/extension && npm ci

      - name: Check version tables in sync
        run: node scripts/check-version-sync.js

      - name: Sync shared code
        run: npm run sync-shared

      - name: Verify sync-shared output is fresh
        run: git diff --exit-code packages/*/shared/ packages/extension/sidepanel/index.html packages/desktop/src/index.html || (echo "ERROR: sync-shared produced changes — run 'npm run sync-shared' locally and commit" && exit 1)

      - name: Run shared tests with coverage
        run: npm run test:shared:coverage

      - name: Run extension unit tests with coverage
        run: cd packages/extension && npm run test:coverage

      - name: Run desktop unit tests
        run: npm run test:desktop

      - name: Upload JS coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info,packages/extension/coverage/lcov.info
          flags: javascript
          token: ${{ secrets.CODECOV_TOKEN }}

  playwright-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm ci

      - name: Sync shared code
        run: npm run sync-shared

      - name: Install Playwright dependencies
        working-directory: packages/extension/tests/automated
        run: npm ci

      - name: Install Playwright browsers
        working-directory: packages/extension/tests/automated
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        working-directory: packages/extension/tests/automated
        run: xvfb-run npx playwright test

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: packages/extension/tests/automated/test-results/
          retention-days: 7

  desktop-integration-tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('packages/desktop/src-tauri/Cargo.lock') }}

      - name: Create frontend dist directory
        working-directory: packages/desktop
        run: New-Item -ItemType Directory -Force -Path dist | Out-Null
        shell: pwsh

      - name: Run Clippy lints
        working-directory: packages/desktop/src-tauri
        run: cargo clippy -- -D warnings

      - name: Run Rust unit tests with coverage
        working-directory: packages/desktop/src-tauri
        run: cargo llvm-cov --lib --test worker_pool_test --test scroll_test --test windows_capture_test --test commands_test --lcov --output-path coverage.lcov

      - name: Run integration tests
        working-directory: packages/desktop/src-tauri
        run: cargo test --test capture_integration

      - name: Upload Rust coverage report
        uses: actions/upload-artifact@v7
        with:
          name: rust-coverage
          path: packages/desktop/src-tauri/coverage.lcov
          retention-days: 7

      - name: Upload Rust coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: packages/desktop/src-tauri/coverage.lcov
          flags: rust
          token: ${{ secrets.CODECOV_TOKEN }}

  desktop-playwright-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm ci

      - name: Sync shared code and build desktop dist
        run: npm run sync-shared && npm run build:desktop-dist

      - name: Install desktop Playwright dependencies
        working-directory: packages/desktop/tests/automated
        run: npm ci

      - name: Install Playwright browsers
        working-directory: packages/desktop/tests/automated
        run: npx playwright install chromium --with-deps

      - name: Run desktop Playwright tests
        working-directory: packages/desktop/tests/automated
        run: npx playwright test

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: desktop-playwright-report
          path: packages/desktop/tests/automated/test-results/
          retention-days: 7


