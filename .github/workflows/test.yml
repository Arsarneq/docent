name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      extension: ${{ steps.filter.outputs.extension }}
      desktop: ${{ steps.filter.outputs.desktop }}
      shared: ${{ steps.filter.outputs.shared }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            extension:
              - 'packages/extension/**'
            desktop:
              - 'packages/desktop/**'
            shared:
              - 'packages/shared/**'
            ci:
              - '.github/workflows/**'
              - 'scripts/**'
              - 'package.json'
              - 'package-lock.json'
              - 'eslint.config.js'
              - '.prettierrc'
              - '.c8rc.json'
              - '.editorconfig'
              - 'codecov.yml'

  lint:
    needs: [changes]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint:js

      - name: Stylelint
        run: npm run lint:css

      - name: Prettier check
        run: npm run lint:format

      - name: markdownlint
        run: npm run lint:md

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo fmt check
        working-directory: packages/desktop/src-tauri
        run: cargo fmt --check

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm ci

      - name: Audit npm dependencies
        run: npm audit --audit-level=high --package-lock-only

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo-audit
        id: cache-cargo-audit
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-audit
          key: ${{ runner.os }}-cargo-audit-0.21

      - name: Install cargo-audit
        if: steps.cache-cargo-audit.outputs.cache-hit != 'true'
        run: cargo install cargo-audit

      - name: Audit Rust dependencies
        working-directory: packages/desktop/src-tauri
        run: cargo audit --ignore RUSTSEC-2024-0429

  unit-tests:
    needs: [lint, changes]
    if: |
      needs.changes.outputs.extension == 'true' ||
      needs.changes.outputs.desktop == 'true' ||
      needs.changes.outputs.shared == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      github.event_name == 'release' ||
      github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm ci

      - name: Install extension test dependencies
        run: cd packages/extension && npm ci

      - name: Check version tables in sync
        run: node scripts/check-version-sync.js

      - name: Sync shared code
        run: npm run sync-shared

      - name: Build desktop dist
        run: npm run build:desktop-dist

      - name: Verify sync-shared output is fresh
        run: |
          git diff --exit-code packages/*/shared/ packages/extension/sidepanel/index.html packages/desktop/src/index.html || (echo "ERROR: sync-shared produced changes — run 'npm run sync-shared' locally and commit" && exit 1)

      - name: Run shared and desktop tests with coverage
        run: npm run test:coverage

      - name: Run extension unit tests with coverage
        run: cd packages/extension && npm run test:coverage

      # Coverage is uploaded to Codecov by the terminal `coverage-upload` job,
      # not here. Each test job publishes its lcov as an artifact so all uploads
      # land in one tight window — this keeps the Codecov PR comment from sitting
      # on a stale intermediate value while jobs finish minutes apart.
      - name: Stage JS unit coverage
        run: |
          mkdir -p coverage-artifacts
          cp coverage/lcov.info coverage-artifacts/shared-desktop-unit.lcov
          cp packages/extension/coverage/lcov.info coverage-artifacts/extension-unit.lcov

      - name: Upload JS unit coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-unit-javascript
          path: coverage-artifacts/*.lcov
          retention-days: 1

  extension-e2e-tests:
    needs: [lint, changes]
    if: |
      needs.changes.outputs.extension == 'true' ||
      needs.changes.outputs.shared == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      github.event_name == 'release' ||
      github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm ci

      - name: Sync shared code
        run: npm run sync-shared

      - name: Install Playwright dependencies
        working-directory: packages/extension/tests/e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: packages/extension/tests/e2e
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        working-directory: packages/extension/tests/e2e
        run: xvfb-run npx playwright test

      - name: Upload extension E2E coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-e2e-javascript
          path: packages/extension/tests/e2e/coverage/lcov.info
          retention-days: 1

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: packages/extension/tests/e2e/test-results/
          retention-days: 7

  desktop-rust-tests:
    needs: [lint, changes]
    if: |
      needs.changes.outputs.desktop == 'true' ||
      needs.changes.outputs.shared == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      github.event_name == 'release' ||
      github.event_name == 'push'
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
          # Future platforms:
          # - os: macos-latest
          #   label: macOS
          # - os: ubuntu-latest
          #   label: Linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo-llvm-cov
        id: cache-llvm-cov
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-llvm-cov
          key: ${{ runner.os }}-cargo-llvm-cov-0.6

      - name: Install cargo-llvm-cov
        if: steps.cache-llvm-cov.outputs.cache-hit != 'true'
        run: cargo install cargo-llvm-cov

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('packages/desktop/src-tauri/Cargo.lock') }}

      - name: Create frontend dist directory
        working-directory: packages/desktop
        run: New-Item -ItemType Directory -Force -Path dist | Out-Null
        shell: pwsh

      - name: Run Clippy lints
        working-directory: packages/desktop/src-tauri
        run: cargo clippy -- -D warnings

      # Coverage is split by pyramid layer into two llvm-cov runs so each lands
      # under the correct Codecov flag (unit vs integration). The split is
      # fully auto-discovered from the test sources — there are no test-name
      # lists in this workflow:
      #
      #   ci-skip     — a test file containing the `ci-skip` marker in its source
      #                 is excluded from CI entirely (e.g. file_dialog_test, which
      #                 launches Notepad — not reliable on CI runners).
      #   integration — synthesises real OS input, identified by importing the
      #                 `enigo` crate (drives real windows).
      #   unit        — every other test under tests/ (deterministic logic,
      #                 state machines, property tests) + `--lib` in-module tests.
      #
      # A new test classifies itself from its own source: add `use enigo` for
      # integration (otherwise unit), and add a `ci-skip` comment to opt out of
      # CI. Nothing to edit here.
      - name: Discover Rust test layers
        working-directory: packages/desktop/src-tauri
        shell: bash
        run: |
          unit_args=""
          integration_args=""
          for path in tests/*.rs; do
            name=$(basename "$path" .rs)
            if grep -qE '(^|[^[:alnum:]])ci-skip([^[:alnum:]]|$)' "$path"; then
              echo "Skipping $name (ci-skip marker)"
              continue
            fi
            if grep -qE '^use enigo' "$path"; then
              integration_args="$integration_args --test $name"
            else
              unit_args="$unit_args --test $name"
            fi
          done
          echo "Unit binaries:$unit_args"
          echo "Integration binaries:$integration_args"
          echo "RUST_UNIT_TEST_ARGS=$unit_args" >> "$GITHUB_ENV"
          echo "RUST_INTEGRATION_TEST_ARGS=$integration_args" >> "$GITHUB_ENV"

      - name: Run Rust unit tests with coverage
        working-directory: packages/desktop/src-tauri
        shell: bash
        run: cargo llvm-cov --lib $RUST_UNIT_TEST_ARGS --ignore-filename-regex "(lib|main)\.rs$" --lcov --output-path coverage-unit.lcov

      - name: Run Rust integration tests with coverage
        working-directory: packages/desktop/src-tauri
        shell: bash
        run: cargo llvm-cov $RUST_INTEGRATION_TEST_ARGS --ignore-filename-regex "(lib|main)\.rs$" --lcov --output-path coverage-integration.lcov

      - name: Upload Rust coverage reports
        uses: actions/upload-artifact@v7
        with:
          name: coverage-rust
          path: |
            packages/desktop/src-tauri/coverage-unit.lcov
            packages/desktop/src-tauri/coverage-integration.lcov
          retention-days: 1

  desktop-integration-tests:
    needs: [lint, changes]
    if: |
      needs.changes.outputs.desktop == 'true' ||
      needs.changes.outputs.shared == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      github.event_name == 'release' ||
      github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm ci

      - name: Sync shared code and build desktop dist
        run: npm run sync-shared && npm run build:desktop-dist

      - name: Install desktop Playwright dependencies
        working-directory: packages/desktop/tests/integration
        run: npm ci

      - name: Install Playwright browsers
        working-directory: packages/desktop/tests/integration
        run: npx playwright install chromium --with-deps

      - name: Run desktop Playwright tests
        working-directory: packages/desktop/tests/integration
        run: npx playwright test

      - name: Upload desktop integration coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-integration-javascript
          path: packages/desktop/tests/integration/coverage/lcov.info
          retention-days: 1

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: desktop-playwright-report
          path: packages/desktop/tests/integration/test-results/
          retention-days: 7

  # Terminal coverage upload. Every test job publishes its lcov as an artifact
  # rather than uploading to Codecov itself; this job collects them all and
  # uploads back-to-back in one tight window. Two reasons:
  #   1. The Codecov PR comment updates on every upload it receives. When
  #      uploads were spread across jobs finishing minutes apart, the comment
  #      sat on stale intermediate values (and sometimes never caught the last
  #      one). Bunching the uploads makes it converge immediately.
  #   2. A single place owns the flag taxonomy (pyramid layer x language).
  #
  # Each upload step is guarded by hashFiles() so a path-filter-skipped test
  # job (whose artifact is therefore absent) is silently ignored. Codecov's
  # carryforward keeps that flag's last-known coverage in the meantime.
  coverage-upload:
    needs:
      - unit-tests
      - extension-e2e-tests
      - desktop-rust-tests
      - desktop-integration-tests
    if: |
      always() &&
      (needs.unit-tests.result != 'skipped' ||
       needs.extension-e2e-tests.result != 'skipped' ||
       needs.desktop-rust-tests.result != 'skipped' ||
       needs.desktop-integration-tests.result != 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: coverage-*
          path: coverage-artifacts

      - name: Upload unit JS coverage to Codecov
        if: hashFiles('coverage-artifacts/coverage-unit-javascript/*.lcov') != ''
        uses: codecov/codecov-action@v6
        with:
          files: coverage-artifacts/coverage-unit-javascript/shared-desktop-unit.lcov,coverage-artifacts/coverage-unit-javascript/extension-unit.lcov
          flags: unit,javascript
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload extension E2E coverage to Codecov
        if: hashFiles('coverage-artifacts/coverage-e2e-javascript/lcov.info') != ''
        uses: codecov/codecov-action@v6
        with:
          files: coverage-artifacts/coverage-e2e-javascript/lcov.info
          flags: e2e,javascript
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload Rust unit coverage to Codecov
        if: hashFiles('coverage-artifacts/coverage-rust/coverage-unit.lcov') != ''
        uses: codecov/codecov-action@v6
        with:
          files: coverage-artifacts/coverage-rust/coverage-unit.lcov
          flags: unit,rust
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload Rust integration coverage to Codecov
        if: hashFiles('coverage-artifacts/coverage-rust/coverage-integration.lcov') != ''
        uses: codecov/codecov-action@v6
        with:
          files: coverage-artifacts/coverage-rust/coverage-integration.lcov
          flags: integration,rust
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload desktop integration JS coverage to Codecov
        if: hashFiles('coverage-artifacts/coverage-integration-javascript/lcov.info') != ''
        uses: codecov/codecov-action@v6
        with:
          files: coverage-artifacts/coverage-integration-javascript/lcov.info
          flags: integration,javascript
          token: ${{ secrets.CODECOV_TOKEN }}

  ci-gate:
    runs-on: ubuntu-latest
    if: always()
    needs:
      - changes
      - lint
      - dependency-audit
      - unit-tests
      - extension-e2e-tests
      - desktop-rust-tests
      - desktop-integration-tests
      - coverage-upload
    steps:
      - name: Check job results
        run: |
          results=("${{ needs.changes.result }}" "${{ needs.lint.result }}" "${{ needs.dependency-audit.result }}" "${{ needs.unit-tests.result }}" "${{ needs.extension-e2e-tests.result }}" "${{ needs.desktop-rust-tests.result }}" "${{ needs.desktop-integration-tests.result }}" "${{ needs.coverage-upload.result }}")
          for result in "${results[@]}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "Job failed with result: $result"
              exit 1
            fi
          done
          echo "All jobs passed or were skipped"


