name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm ci

      - name: Install extension test dependencies
        run: cd packages/extension && npm ci

      - name: Sync shared code
        run: npm run sync-shared

      - name: Run shared tests
        run: npm run test:shared

      - name: Run extension unit tests
        run: npm run test:extension

      - name: Run desktop unit tests
        run: npm run test:desktop

  playwright-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm ci

      - name: Sync shared code
        run: npm run sync-shared

      - name: Install Playwright dependencies
        working-directory: packages/extension/tests/automated
        run: npm ci

      - name: Install Playwright browsers
        working-directory: packages/extension/tests/automated
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        working-directory: packages/extension/tests/automated
        run: xvfb-run npx playwright test

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/extension/tests/automated/test-results/
          retention-days: 7
