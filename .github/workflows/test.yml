name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # Called by the publish workflows so a release only proceeds on a green suite
  # for the release SHA (see publish.yml / publish-desktop.yml). Replaces the old
  # standalone `release: published` trigger — running the suite via the call (not
  # a second independent run) is what makes the publish job depend on it.
  workflow_call:
    inputs:
      # Which platform a publish is releasing — scopes the suite to that
      # platform's exclusive jobs PLUS the shared/common ones, so a desktop
      # failure can't block an extension release (and vice-versa). Empty on
      # push/PR, where the `changes` path filter decides what runs. An unset/empty
      # value runs everything (fail-safe: a caller that forgets it skips nothing).
      platform:
        type: string
        required: false
        default: ''
    secrets:
      # The suite's only secret (coverage upload). Declared + passed explicitly by
      # the publish callers instead of `secrets: inherit`, so the reusable workflow
      # never receives every repo secret. Optional: direct push/PR runs read the
      # token from the repo secret context, not from a caller.
      CODECOV_TOKEN:
        required: false

permissions:
  contents: read

env:
  NODE_VERSION: '24'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      extension: ${{ steps.filter.outputs.extension }}
      desktop: ${{ steps.filter.outputs.desktop }}
      shared: ${{ steps.filter.outputs.shared }}
      schema: ${{ steps.filter.outputs.schema }}
      referenceServer: ${{ steps.filter.outputs.referenceServer }}
      corpus: ${{ steps.filter.outputs.corpus }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            extension:
              - 'packages/extension/**'
            desktop:
              - 'packages/desktop/**'
            shared:
              - 'packages/shared/**'
            schema:
              - 'schemas/**'
            referenceServer:
              - 'reference-implementations/**'
            corpus:
              - 'corpus/**'
            ci:
              - '.github/workflows/**'
              - 'scripts/**'
              - 'package.json'
              - 'package-lock.json'
              - 'eslint.config.js'
              - '.prettierrc'
              - '.c8rc.json'
              - '.editorconfig'
              - 'codecov.yml'

  lint:
    needs: [changes]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          # Full history so the release-output guard can diff against the PR
          # base via merge-base (three-dot). Other steps don't need it but it's
          # harmless.
          fetch-depth: 0

      - uses: ./.github/actions/debug-env

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint:js

      - name: Stylelint
        run: npm run lint:css

      - name: Prettier check
        run: npm run lint:format ${{ runner.debug == '1' && '-- --log-level debug' || '' }}

      - name: markdownlint
        run: npm run lint:md

      # remark-validate-links (--frail): every relative doc link and heading
      # #anchor must resolve. Complements markdownlint, which does not check link
      # targets — so a moved/renamed doc that breaks a link fails here, not silently.
      - name: Validate documentation links
        run: npm run lint:links

      # S17/S18: every Actions `uses:` must be pinned to a commit SHA, not a
      # mutable tag. Dependabot bumps the SHA + `# version` comment weekly.
      - name: Check GitHub Actions are SHA-pinned
        run: npm run check:action-pins

      # Guard 2: release-output guard. On a normal feature branch it FAILS if the
      # branch touched release-only outputs (schemas/dist/ or a delta `version`).
      # On the automation branch the release pipeline opens
      # (automated/version-table-update) it instead POSITIVELY validates that the
      # PR is exactly the mechanical regeneration — only release outputs, and a
      # dist/ that composes from source. The script switches on PR_HEAD_REF. Only
      # meaningful on PRs, where we have a base branch to diff against; skipped on
      # push/release.
      - name: No release-only outputs on PR
        if: github.event_name == 'pull_request'
        env:
          PR_HEAD_REF: ${{ github.head_ref }}
        run: |
          git fetch --no-tags origin "$GITHUB_BASE_REF"
          node scripts/check-no-release-outputs.js "origin/$GITHUB_BASE_REF"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
          components: rustfmt

      - name: cargo fmt check
        working-directory: packages/desktop/src-tauri
        run: cargo fmt --check ${{ runner.debug == '1' && '-- --verbose' || '' }}

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/debug-env

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install root dependencies
        run: npm ci

      # --- npm side: advisories (npm audit) + license gate (cargo-deny is
      # Rust-only, so npm keeps its own advisory audit). ---
      - name: Audit npm dependencies (advisories)
        run: npm audit --audit-level=high --package-lock-only

      # The npm license gate scans every real install root (this is NOT an
      # npm-workspaces repo), so each root needs its node_modules present.
      - name: Install extension dependencies
        run: cd packages/extension && npm ci

      - name: Install extension e2e dependencies
        run: cd packages/extension/tests/e2e && npm ci

      - name: Install desktop integration dependencies
        run: cd packages/desktop/tests/integration && npm ci

      - name: Check npm dependency licenses (default-deny allowlist)
        run: npm run check:licenses

      # --- Rust side: consolidated on cargo-deny (replaces cargo-audit). Licenses
      # and advisories run as SEPARATE steps so a red gate shows which one failed;
      # both block (this job is required by ci-gate and by the publish workflows).
      # Config + the advisory ignore list live in packages/desktop/src-tauri/deny.toml.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable

      - name: Cache cargo-deny
        id: cache-cargo-deny
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cargo/bin/cargo-deny
          key: ${{ runner.os }}-cargo-deny-0.19.9

      - name: Install cargo-deny
        if: steps.cache-cargo-deny.outputs.cache-hit != 'true'
        run: cargo install cargo-deny --version 0.19.9 --locked

      - name: Check Rust dependency licenses (default-deny allowlist)
        working-directory: packages/desktop/src-tauri
        run: cargo deny check licenses

      - name: Audit Rust dependencies (advisories)
        working-directory: packages/desktop/src-tauri
        run: cargo deny check advisories

  unit-tests:
    needs: [lint, changes]
    if: |
      needs.changes.outputs.extension == 'true' ||
      needs.changes.outputs.desktop == 'true' ||
      needs.changes.outputs.shared == 'true' ||
      needs.changes.outputs.schema == 'true' ||
      needs.changes.outputs.corpus == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      github.event_name == 'release' ||
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/debug-env

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install root dependencies
        run: npm ci

      - name: Install extension test dependencies
        run: cd packages/extension && npm ci

      - name: Check version tables in sync
        run: node scripts/check-version-sync.js

      # Advisory only (never blocks): surfaces how the next release will version
      # any schema change in this PR. Deltas are intentionally NOT bumped during
      # development — auto-version-schemas.js does that mechanically at release
      # time — so this is informational, not a gate.
      - name: Schema version impact (advisory)
        continue-on-error: true
        run: node scripts/auto-version-schemas.js --check

      - name: Sync shared code
        run: npm run sync-shared

      - name: Build desktop dist
        run: npm run build:desktop-dist

      - name: Verify sync-shared output is fresh
        run: |
          git diff --exit-code packages/*/shared/ packages/extension/sidepanel/index.html packages/desktop/src/index.html || (echo "ERROR: sync-shared produced changes — run 'npm run sync-shared' locally and commit" && exit 1)

      - name: Run shared and desktop tests with coverage
        run: npm run test:coverage

      - name: Run extension unit tests with coverage
        run: cd packages/extension && npm run test:coverage

      # Coverage is uploaded to Codecov by the terminal `coverage-upload` job,
      # not here. Each test job publishes its lcov as an artifact so all uploads
      # land in one tight window — this keeps the Codecov PR comment from sitting
      # on a stale intermediate value while jobs finish minutes apart.
      - name: Stage JS unit coverage
        run: |
          mkdir -p coverage-artifacts
          cp coverage/lcov.info coverage-artifacts/shared-desktop-unit.lcov
          cp packages/extension/coverage/lcov.info coverage-artifacts/extension-unit.lcov

      - name: Upload JS unit coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-unit-javascript
          path: coverage-artifacts/*.lcov
          retention-days: 1

  extension-e2e-tests:
    needs: [lint, changes]
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
        (needs.changes.outputs.extension == 'true' ||
          needs.changes.outputs.shared == 'true' ||
          needs.changes.outputs.schema == 'true' ||
          needs.changes.outputs.referenceServer == 'true' ||
          needs.changes.outputs.corpus == 'true' ||
          needs.changes.outputs.ci == 'true')) ||
      ((github.event_name == 'release' || github.event_name == 'workflow_dispatch') &&
        (inputs.platform == '' || inputs.platform == 'extension'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/debug-env

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install root dependencies
        run: npm ci

      - name: Sync shared code
        run: npm run sync-shared

      - name: Install Playwright dependencies
        working-directory: packages/extension/tests/e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: packages/extension/tests/e2e
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        working-directory: packages/extension/tests/e2e
        run: xvfb-run npx playwright test

      # Superset of truth production: the vectors config also produces the
      # conformance vectors and asserts each produced vector deep-equals its
      # committed file (the produce-stage oracle). Truth envelopes are emitted
      # unchanged, so the Corpus truth diff step below still validates them. The
      # structural vector hygiene locks run in the unit-tests job via test:shared.
      - name: Produce capture corpus + conformance vectors (extension)
        working-directory: packages/extension/tests/e2e
        run: xvfb-run npx playwright test --config playwright.vectors.config.js

      - name: Corpus truth diff
        run: npm run corpus:check

      - name: Upload corpus output
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: corpus-extension-output
          path: corpus/out/
          retention-days: 7

      - name: Upload extension E2E coverage artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-e2e-javascript
          path: packages/extension/tests/e2e/coverage/lcov.info
          retention-days: 1

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: packages/extension/tests/e2e/test-results/
          retention-days: 7

  desktop-rust-tests:
    needs: [lint, changes]
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
        (needs.changes.outputs.desktop == 'true' ||
          needs.changes.outputs.shared == 'true' ||
          needs.changes.outputs.corpus == 'true' ||
          needs.changes.outputs.ci == 'true')) ||
      ((github.event_name == 'release' || github.event_name == 'workflow_dispatch') &&
        (inputs.platform == '' || inputs.platform == 'desktop'))
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
          # This job runs the FULL test + coverage pipeline (real UIA + enigo
          # input), so it only lists platforms that have a working capture
          # backend AND a cross-platform test path. Add Linux (#84) here when
          # its backend lands — at which point this job and desktop-cross-compile
          # are intended to converge into one matrix (#125). (macOS dropped — #83.)
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/debug-env

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
          components: llvm-tools-preview

      - name: Cache cargo-llvm-cov
        id: cache-llvm-cov
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cargo/bin/cargo-llvm-cov
          key: ${{ runner.os }}-cargo-llvm-cov-0.6

      - name: Install cargo-llvm-cov
        if: steps.cache-llvm-cov.outputs.cache-hit != 'true'
        run: cargo install cargo-llvm-cov

      - name: Cache cargo registry and build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('packages/desktop/src-tauri/Cargo.lock') }}

      - name: Create frontend dist directory
        working-directory: packages/desktop
        run: New-Item -ItemType Directory -Force -Path dist | Out-Null
        shell: pwsh

      - name: Run Clippy lints
        working-directory: packages/desktop/src-tauri
        run: cargo clippy ${{ runner.debug == '1' && '-v' || '' }} -- -D warnings

      # Coverage is split by pyramid layer into two llvm-cov runs so each lands
      # under the correct Codecov flag (unit vs integration). The split is
      # fully auto-discovered from the test sources — there are no test-name
      # lists in this workflow:
      #
      #   ci-skip     — a test file containing the `ci-skip` marker in its source
      #                 is excluded from CI entirely (e.g. file_dialog_test, which
      #                 launches Notepad — not reliable on CI runners).
      #   integration — synthesises real OS input, identified by importing the
      #                 `enigo` crate (drives real windows).
      #   unit        — every other test under tests/ (deterministic logic,
      #                 state machines, property tests) + `--lib` in-module tests.
      #
      # A new test classifies itself from its own source: add `use enigo` for
      # integration (otherwise unit), and add a `ci-skip` comment to opt out of
      # CI. Nothing to edit here.
      - name: Discover Rust test layers
        working-directory: packages/desktop/src-tauri
        shell: bash
        run: |
          unit_args=""
          integration_args=""
          for path in tests/*.rs; do
            name=$(basename "$path" .rs)
            if grep -qE '(^|[^[:alnum:]])ci-skip([^[:alnum:]]|$)' "$path"; then
              echo "Skipping $name (ci-skip marker)"
              continue
            fi
            if grep -qE '^use enigo' "$path"; then
              integration_args="$integration_args --test $name"
            else
              unit_args="$unit_args --test $name"
            fi
          done
          echo "Unit binaries:$unit_args"
          echo "Integration binaries:$integration_args"
          echo "RUST_UNIT_TEST_ARGS=$unit_args" >> "$GITHUB_ENV"
          echo "RUST_INTEGRATION_TEST_ARGS=$integration_args" >> "$GITHUB_ENV"

      - name: Run Rust unit tests with coverage
        working-directory: packages/desktop/src-tauri
        shell: bash
        run: |
          # RUST_UNIT_TEST_ARGS is a space-separated arg list (set into $GITHUB_ENV
          # above); it stays unquoted on purpose so each filter becomes a separate
          # cargo argument (and an empty value expands to nothing).
          # shellcheck disable=SC2086
          cargo llvm-cov --lib $RUST_UNIT_TEST_ARGS --ignore-filename-regex "(lib|main)\.rs$" --lcov --output-path coverage-unit.lcov ${{ runner.debug == '1' && '-- --nocapture' || '' }}

      - name: Run Rust integration tests with coverage
        working-directory: packages/desktop/src-tauri
        shell: bash
        # --test-threads=1: every integration test is #[serial] (they share the
        # OS input layer via enigo), so they never run concurrently anyway.
        # libtest's default parallel runner still pre-spawns all test threads,
        # leaving all-but-one blocked on the serial lock — and its 60s
        # "still running" timer counts that blocked wait, emitting misleading
        # "has been running for over 60 seconds" warnings for tests that have
        # done no work. Running single-threaded removes the phantom warnings at
        # no cost (the suite was already fully serialized).
        run: |
          # RUST_INTEGRATION_TEST_ARGS is a space-separated arg list (set into
          # $GITHUB_ENV above); it stays unquoted on purpose so each filter becomes
          # a separate cargo argument (and an empty value expands to nothing).
          # shellcheck disable=SC2086
          cargo llvm-cov $RUST_INTEGRATION_TEST_ARGS --ignore-filename-regex "(lib|main)\.rs$" --lcov --output-path coverage-integration.lcov -- --test-threads=1 ${{ runner.debug == '1' && '--nocapture' || '' }}

      - name: Upload Rust coverage reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-rust
          path: |
            packages/desktop/src-tauri/coverage-unit.lcov
            packages/desktop/src-tauri/coverage-integration.lcov
          retention-days: 1

      - name: Upload corpus event dumps
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: corpus-desktop-events
          path: corpus/out/desktop-windows-events/
          retention-days: 1

  # Assemble the desktop corpus event dumps through the real frontend pipeline
  # and diff the envelopes against committed truth (docs/scripted-truth-corpus.md). Runs on
  # ubuntu so the diff logic lives in one place and the Windows job stays lean.
  desktop-corpus-diff:
    needs: [desktop-rust-tests, changes]
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
        (needs.changes.outputs.desktop == 'true' ||
          needs.changes.outputs.shared == 'true' ||
          needs.changes.outputs.corpus == 'true' ||
          needs.changes.outputs.ci == 'true')) ||
      ((github.event_name == 'release' || github.event_name == 'workflow_dispatch') &&
        (inputs.platform == '' || inputs.platform == 'desktop'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install root dependencies
        run: npm ci

      - name: Sync shared code
        run: npm run sync-shared

      - name: Download corpus event dumps
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: corpus-desktop-events
          path: corpus/out/desktop-windows-events/

      - name: Assemble desktop corpus envelopes
        run: npm run corpus:assemble:desktop

      - name: Corpus truth diff (desktop)
        run: npm run corpus:check:desktop

      - name: Upload corpus output
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: corpus-desktop-output
          path: corpus/out/
          retention-days: 7

  # Produce the desktop conformance vector on a PINNED Windows image ([Q-2]).
  # The full-window UIA snapshot retains the OS-chrome subtree (window included —
  # the spec's desktop bound scope), whose structure/ids are Windows-version-
  # bounded; pinning windows-2022 (NOT the inherited windows-latest) makes an OS
  # image bump a DELIBERATE, reviewed re-baseline of the committed vector rather
  # than a silent churn. This job only PRODUCES (emits the vector source dump as
  # an artifact); the ubuntu desktop-vectors-diff job does the normalized diff +
  # locks (the Rust job has no Node) — the shipped 4a desktop-rust-tests ->
  # desktop-corpus-diff produce/diff split, applied to vectors.
  desktop-vectors-produce:
    needs: [lint, changes]
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
        (needs.changes.outputs.desktop == 'true' ||
          needs.changes.outputs.shared == 'true' ||
          needs.changes.outputs.corpus == 'true' ||
          needs.changes.outputs.ci == 'true')) ||
      ((github.event_name == 'release' || github.event_name == 'workflow_dispatch') &&
        (inputs.platform == '' || inputs.platform == 'desktop'))
    timeout-minutes: 30
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/debug-env

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable

      - name: Cache cargo registry and build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('packages/desktop/src-tauri/Cargo.lock') }}

      - name: Create frontend dist directory
        working-directory: packages/desktop
        run: New-Item -ItemType Directory -Force -Path dist | Out-Null
        shell: pwsh

      # Produces corpus/out/desktop-windows-vectors/<fixture>.vecdump.json via
      # real UIA capture over the vector fixture window. #[serial] + single-thread
      # for the shared input layer (same as the corpus integration tests).
      - name: Produce desktop conformance vector
        working-directory: packages/desktop/src-tauri
        run: cargo test --test corpus_capture v_vector_fixture -- --test-threads=1 ${{ runner.debug == '1' && '--nocapture' || '' }}

      - name: Upload desktop vector dumps
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: corpus-desktop-vectors
          path: corpus/out/desktop-windows-vectors/
          retention-days: 1

  # Assemble the desktop vector dump into its committed shape, NORMALIZED-diff it
  # against the committed vector (the produce==committed oracle — normalized, not
  # byte-identical, reusing the shipped 4a class rules — [Z-1]/[Q-1]), and run the
  # structural hygiene locks + meta-schema. Runs on ubuntu so the diff logic lives
  # in one place ([Q-3]: this ubuntu normalized diff IS the reproduce+drift gate;
  # no same-OS Windows probe). Mirrors the shipped 4a desktop-corpus-diff job.
  desktop-vectors-diff:
    needs: [desktop-vectors-produce, changes]
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
        (needs.changes.outputs.desktop == 'true' ||
          needs.changes.outputs.shared == 'true' ||
          needs.changes.outputs.corpus == 'true' ||
          needs.changes.outputs.ci == 'true')) ||
      ((github.event_name == 'release' || github.event_name == 'workflow_dispatch') &&
        (inputs.platform == '' || inputs.platform == 'desktop'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install root dependencies
        run: npm ci

      - name: Sync shared code
        run: npm run sync-shared

      - name: Download desktop vector dumps
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: corpus-desktop-vectors
          path: corpus/out/desktop-windows-vectors/

      - name: Assemble + normalized diff (desktop vectors)
        run: npm run vectors:assemble:desktop

      - name: Vector hygiene locks + meta-schema (desktop)
        run: node --test packages/shared/tests/unit/conformance-vectors.test.js

      - name: Upload vector output
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: corpus-desktop-vectors-output
          path: corpus/out/
          retention-days: 7

  # Cross-platform COMPILE gate (#97). This is the comprehensive "builds on
  # every target we ship for" job: it `cargo check`s + clippy-checks the crate
  # on Windows and Linux, but runs NO tests. It complements the
  # desktop-rust-tests job, which runs the full test+coverage pipeline only on
  # the platforms that have a real capture backend (Windows today). Keeping the
  # full target list here means the cross-platform seam (the no-op
  # `capture::stub` backend behind `Capture` on non-Windows) is proven to keep
  # compiling as the code evolves toward native Linux (#84) support.
  # (macOS was dropped — see #83 — as it has no free code-signing path and
  # unsigned apps are unusable for non-technical users.)
  #
  # NOTE (#125): once a non-Windows backend gains a working test+coverage path,
  # this compile-only job and desktop-rust-tests are intended to converge into a
  # single full-pipeline matrix. Until then they stay split — see #125.
  desktop-cross-compile:
    needs: [lint, changes]
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
        (needs.changes.outputs.desktop == 'true' ||
          needs.changes.outputs.shared == 'true' ||
          needs.changes.outputs.ci == 'true')) ||
      ((github.event_name == 'release' || github.event_name == 'workflow_dispatch') &&
        (inputs.platform == '' || inputs.platform == 'desktop'))
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
          - os: ubuntu-latest
            label: Linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/debug-env

      # Tauri's Linux build links against WebKitGTK/GTK; these dev packages must
      # be present for `cargo check` to resolve the tauri build script.
      # (macOS uses the system WebKit — no install needed.)
      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
          components: clippy

      - name: Cache cargo registry and build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-xcompile-${{ hashFiles('packages/desktop/src-tauri/Cargo.lock') }}

      - name: Create frontend dist directory
        shell: bash
        run: mkdir -p packages/desktop/dist

      - name: cargo check (lib + bin)
        working-directory: packages/desktop/src-tauri
        run: cargo check --all-targets ${{ runner.debug == '1' && '-v' || '' }}

      - name: Clippy
        working-directory: packages/desktop/src-tauri
        run: cargo clippy ${{ runner.debug == '1' && '-v' || '' }} -- -D warnings

  desktop-integration-tests:
    needs: [lint, changes]
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
        (needs.changes.outputs.desktop == 'true' ||
          needs.changes.outputs.shared == 'true' ||
          needs.changes.outputs.schema == 'true' ||
          needs.changes.outputs.referenceServer == 'true' ||
          needs.changes.outputs.ci == 'true')) ||
      ((github.event_name == 'release' || github.event_name == 'workflow_dispatch') &&
        (inputs.platform == '' || inputs.platform == 'desktop'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/debug-env

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install root dependencies
        run: npm ci

      - name: Sync shared code and build desktop dist
        run: npm run sync-shared && npm run build:desktop-dist

      - name: Install desktop Playwright dependencies
        working-directory: packages/desktop/tests/integration
        run: npm ci

      - name: Install Playwright browsers
        working-directory: packages/desktop/tests/integration
        run: npx playwright install chromium --with-deps

      - name: Run desktop Playwright tests
        working-directory: packages/desktop/tests/integration
        run: npx playwright test

      - name: Upload desktop integration coverage artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-integration-javascript
          path: packages/desktop/tests/integration/coverage/lcov.info
          retention-days: 1

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: desktop-playwright-report
          path: packages/desktop/tests/integration/test-results/
          retention-days: 7

  # Reference Sync Server tests (repo/testing artifact, excluded from releases).
  # Runs the server's own pyramid-layered suites — tests/unit + tests/integration
  # under reference-implementations/sync-server — which run NOWHERE else in CI.
  # The unit layer includes the samples-conformance guard: it validates the
  # bundled seed samples against the platform schemas composed from source, so a
  # schema-shape change that a sample no longer matches fails HERE, on the PR.
  # Gated on the reference server, the schemas it validates against, and shared
  # (the validator/digest the conformance test composes through).
  reference-server-tests:
    needs: [lint, changes]
    if: |
      needs.changes.outputs.referenceServer == 'true' ||
      needs.changes.outputs.schema == 'true' ||
      needs.changes.outputs.shared == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      github.event_name == 'release' ||
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/debug-env

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      # The reference server has no runtime deps, but the samples-conformance
      # unit test composes the platform schema (scripts/build-schemas.js → ajv +
      # prettier) — all root devDependencies — so install at the repo root.
      - name: Install root dependencies
        run: npm ci

      - name: Run reference sync server tests (unit + integration)
        working-directory: reference-implementations/sync-server
        run: npm test

  # Terminal coverage upload. Every test job publishes its lcov as an artifact
  # rather than uploading to Codecov itself; this job collects them all and
  # uploads back-to-back in one tight window. Two reasons:
  #   1. The Codecov PR comment updates on every upload it receives. When
  #      uploads were spread across jobs finishing minutes apart, the comment
  #      sat on stale intermediate values (and sometimes never caught the last
  #      one). Bunching the uploads makes it converge immediately.
  #   2. A single place owns the flag taxonomy (pyramid layer x language).
  #
  # Each upload step is guarded by hashFiles() so a path-filter-skipped test
  # job (whose artifact is therefore absent) is silently ignored. Codecov's
  # carryforward keeps that flag's last-known coverage in the meantime.
  #
  # This job ALWAYS runs (never skipped by path filters). On a docs-/CI-only PR
  # every test job is skipped, so no artifacts exist — in that case the final
  # step issues a Codecov `empty-upload`, which tells Codecov the commit has no
  # coverage to report and to pass its status checks. Without this, the required
  # codecov/project and codecov/patch checks would never be reported on such
  # PRs and GitHub would block them on "Expected — waiting" forever.
  coverage-upload:
    needs:
      - unit-tests
      - extension-e2e-tests
      - desktop-rust-tests
      - desktop-integration-tests
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/debug-env

      - name: Download all coverage artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: coverage-*
          path: coverage-artifacts

      - name: Detect whether any coverage was produced
        id: detect
        run: |
          if [ -n "$(find coverage-artifacts -name '*.lcov' -o -name 'lcov.info' 2>/dev/null)" ]; then
            echo "has_coverage=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_coverage=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload unit JS coverage to Codecov
        if: hashFiles('coverage-artifacts/coverage-unit-javascript/*.lcov') != ''
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: coverage-artifacts/coverage-unit-javascript/shared-desktop-unit.lcov,coverage-artifacts/coverage-unit-javascript/extension-unit.lcov
          disable_search: true
          flags: unit,javascript
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: ${{ runner.debug == '1' }}

      - name: Upload extension E2E coverage to Codecov
        if: hashFiles('coverage-artifacts/coverage-e2e-javascript/lcov.info') != ''
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: coverage-artifacts/coverage-e2e-javascript/lcov.info
          disable_search: true
          flags: e2e,javascript
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: ${{ runner.debug == '1' }}

      - name: Upload Rust unit coverage to Codecov
        if: hashFiles('coverage-artifacts/coverage-rust/coverage-unit.lcov') != ''
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: coverage-artifacts/coverage-rust/coverage-unit.lcov
          disable_search: true
          flags: unit,rust
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: ${{ runner.debug == '1' }}

      - name: Upload Rust integration coverage to Codecov
        if: hashFiles('coverage-artifacts/coverage-rust/coverage-integration.lcov') != ''
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: coverage-artifacts/coverage-rust/coverage-integration.lcov
          disable_search: true
          flags: integration,rust
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: ${{ runner.debug == '1' }}

      - name: Upload desktop integration JS coverage to Codecov
        if: hashFiles('coverage-artifacts/coverage-integration-javascript/lcov.info') != ''
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: coverage-artifacts/coverage-integration-javascript/lcov.info
          disable_search: true
          flags: integration,javascript
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: ${{ runner.debug == '1' }}

      # No test job produced coverage (docs-/CI-only PR). Tell Codecov the
      # commit is intentionally coverage-free so it posts passing status checks
      # instead of leaving the required project/patch checks unreported.
      - name: Codecov empty upload (no coverage on this commit)
        if: steps.detect.outputs.has_coverage == 'false'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          run_command: 'empty-upload'
          force: true
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: ${{ runner.debug == '1' }}

  # Static analysis of the workflows themselves (template injection, dangerous
  # triggers, cache poisoning, token scope, etc.). Accepted findings are
  # documented in .github/zizmor.yml; anything new fails the gate. The tool
  # version is pinned so a zizmor release can't surprise-break CI.
  zizmor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          version: 1.26.1
          advanced-security: false
          inputs: .github/workflows/

  # Lints the workflow files themselves (syntax, expression typos, and shellcheck
  # on run: scripts). Uses the pinned actionlint Docker image so CI matches the
  # local `docker run rhysd/actionlint` check; intentional shellcheck exceptions
  # are annotated inline with `# shellcheck disable=…`.
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: actionlint
        # Pre-pull with retries — Docker Hub occasionally times out, and a blocking
        # gate shouldn't fail CI for a transient registry hiccup. The run then uses
        # the now-local image and won't re-pull.
        run: |
          img=rhysd/actionlint:1.7.12@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667
          for i in 1 2 3; do
            docker pull "$img" && break
            if [ "$i" = 3 ]; then echo "::error::docker pull failed after 3 attempts"; exit 1; fi
            echo "docker pull failed (attempt $i) — retrying in 5s…"; sleep 5
          done
          docker run --rm -v "$PWD:/repo" --workdir /repo "$img" -color

  ci-gate:
    runs-on: ubuntu-latest
    if: always()
    needs:
      - changes
      - lint
      - dependency-audit
      - unit-tests
      - extension-e2e-tests
      - desktop-rust-tests
      - desktop-corpus-diff
      - desktop-vectors-produce
      - desktop-vectors-diff
      - desktop-cross-compile
      - desktop-integration-tests
      - reference-server-tests
      - coverage-upload
      - zizmor
      - actionlint
    steps:
      - name: Check job results
        run: |
          results=("${{ needs.changes.result }}" "${{ needs.lint.result }}" "${{ needs.dependency-audit.result }}" "${{ needs.unit-tests.result }}" "${{ needs.extension-e2e-tests.result }}" "${{ needs.desktop-rust-tests.result }}" "${{ needs.desktop-corpus-diff.result }}" "${{ needs.desktop-vectors-produce.result }}" "${{ needs.desktop-vectors-diff.result }}" "${{ needs.desktop-cross-compile.result }}" "${{ needs.desktop-integration-tests.result }}" "${{ needs.reference-server-tests.result }}" "${{ needs.coverage-upload.result }}" "${{ needs.zizmor.result }}" "${{ needs.actionlint.result }}")
          for result in "${results[@]}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "Job failed with result: $result"
              exit 1
            fi
          done
          echo "All jobs passed or were skipped"


