name: Bug report
description: Something is not working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which Docent platform are you using?
      options:
        - Chrome Extension
        - Desktop App (Windows)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start a session
        2. Record a step
        3. ...
    validations:
      required: true

  - type: input
    id: os_version
    attributes:
      label: Operating system and version
      placeholder: e.g. Windows 11 23H2, Windows 10 22H2
    validations:
      required: true

  - type: input
    id: chrome_version
    attributes:
      label: Chrome version (extension only)
      placeholder: e.g. 124.0.6367.82
    validations:
      required: false

  - type: input
    id: extension_version
    attributes:
      label: Extension version (extension only)
      placeholder: e.g. 2.0.0
    validations:
      required: false

  - type: input
    id: desktop_version
    attributes:
      label: Desktop app version (desktop only)
      placeholder: e.g. 0.1.0
    validations:
      required: false
